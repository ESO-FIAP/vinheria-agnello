services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vinheria_agnello
      POSTGRES_USER: vinheria_user
      POSTGRES_PASSWORD: "123456"
    ports:
      - "5432:5432"
    volumes:
      - ./sql/users.sql:/docker-entrypoint-initdb.d/01-users.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinheria_user -d vinheria_agnello"]
      interval: 3s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      JDBC_URL: jdbc:postgresql://db:5432/vinheria_agnello
      JDBC_USER: vinheria_user
      JDBC_PASSWORD: "123456"
    depends_on:
      db:
        condition: service_healthy
